<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up | Smart FAQ AI</title>


    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">


    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="auth-container">


    <div class="auth-card">


        <!-- Logo -->

        <div class="auth-logo">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="Logo">

            <h2>Smart FAQ AI</h2>

        </div>




        <h1>

            Create Account

        </h1>



        <p class="subtitle">

            Join Smart FAQ AI and start chatting

        </p>





        <!-- Signup Form -->

        <form action="/signup"
              method="POST">


            <!-- Full Name -->

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input type="text"
                       name="name"
                       placeholder="Full Name"
                       required>

            </div>





            <!-- Username -->

            <div class="input-box">

                <i class="fa-solid fa-id-card"></i>

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

            </div>





            <!-- Email -->

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input type="email"
                       name="email"
                       placeholder="Email Address"
                       required>

            </div>





            <!-- Password -->

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Password"
                       required>


                <i class="fa-solid fa-eye"
                   id="togglePassword"></i>

            </div>





            <!-- Confirm Password -->

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input type="password"
                       id="confirm-password"
                       name="confirm_password"
                       placeholder="Confirm Password"
                       required>


                <i class="fa-solid fa-eye"
                   id="toggleConfirmPassword"></i>

            </div>






            <button type="submit"
                    class="auth-submit">

                Create Account

            </button>




        </form>






        <div class="divider">

            <span>OR</span>

        </div>






        <!-- Google Signup Button -->

        <button class="google-btn"
                id="google-signup">


            <img src="{{ url_for('static', filename='images/google.png') }}"
                 alt="Google">


            Continue with Google


        </button>






        <p class="switch">


            Already have an account?


            <a href="/login">

                Login

            </a>


        </p>





    </div>


</div>




<script src="{{ url_for('static', filename='js/auth.js') }}"></script>


</body>

</html>
